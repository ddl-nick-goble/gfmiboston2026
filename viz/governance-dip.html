<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Governance Dip · Slide Asset</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Palette mirrors the rest of the deck (bg / ink / muted from
       styledtypedoperator_*.html and styledepicycles-slide.html). The signed
       deck accent is mint; magenta is reserved for "intense, costly" moments
       — which is exactly what the descent into the governance dip is. */
    --bg: #0A0B0D;
    --ink: #FFFFFF;
    --ink-soft: #D5D9E1;
    --muted: #8A93A0;
    --rule: #242932;
    --rule-strong: #3A4150;

    --accent: #EC4899;
    --accent-deep: #BE185D;
    --reward: #2DE2A0;
    --reward-deep: #1A8E64;

    --serif: "Playfair Display", "Times New Roman", Georgia, serif;
    --sans:  "Source Sans 3", "Helvetica Neue", Arial, sans-serif;
    --mono:  "JetBrains Mono", "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Stage: 1740×780 design canvas, scaled to viewport ----------
     Sized to match the iframe slot in slide 6 of the host deck (gfmi-talk).
     With the host slide using slide-viz (no kicker, no body), this iframe
     gets ~180px of extra height — the chart-area gains room and the side-
     bar can spread out without crowding the controls or tracker pills. */
  .stage {
    position: fixed;
    inset: 0;
    background: var(--bg);
    overflow: hidden;
  }
  .canvas {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1740px;
    height: 920px;
    margin-left: -870px;
    margin-top: -460px;
    transform-origin: center center;
    background: var(--bg);
  }
  .container {
    width: 100%;
    height: 100%;
    /* Tight padding because the host slide already supplies its own outer
       margin — content here can run nearly to the iframe edge. The layout
       is two columns: the chart on the left uses the full height; the
       sidebar on the right stacks status, controls, and tracker. */
    padding: 12px 40px 0 24px;
    display: grid;
    grid-template-columns: 1fr 300px;
    grid-template-rows: 1fr;
    column-gap: 12px;
  }

  /* ---------- Chart sits flat on bg — no panel, no border, no caption ----- */
  .chart-area {
    /* Fills the left column. The SVG inside uses
       preserveAspectRatio="xMidYMid meet", so the chart keeps its native
       1.68:1 aspect — any small letterbox stays inside the chart-area. */
    width: 100%;
    height: 100%;
    min-width: 0;
    min-height: 0;
    grid-column: 1;
    grid-row: 1;
    align-self: stretch;
  }
  .sidebar {
    grid-column: 2;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    /* Bottom-aligned so the column anchors at the chart's baseline. As the
       status detail line grows or shrinks across phases, the block expands
       upward instead of jumping the lower controls + tracker around. The
       padding-bottom holds the column flush with the chart's x-axis line
       (the SVG has ~65 viewBox units of dead space below the GOVERNANCE
       BUILD-OUT axis label that translates to ~70px at this scale). */
    justify-content: flex-end;
    padding-bottom: 170px;
    gap: 20px;
    min-width: 0;
  }
  .chart-area svg { display: block; width: 100%; height: 100%; }

  /* ----- SVG element styling ----- */
  .grid-line { stroke: var(--rule); stroke-width: 0.6; }
  .grid-tick { fill: var(--muted); font: 600 15px var(--sans); letter-spacing: 0.04em; }

  .axis-line { stroke: var(--ink); stroke-width: 1.2; }
  .axis-arrow { fill: var(--ink); }

  .axis-label {
    font: 700 18px var(--sans);
    fill: var(--ink);
    letter-spacing: 0.20em;
    text-transform: uppercase;
  }

  .zero-line { stroke: var(--rule-strong); stroke-width: 1; stroke-dasharray: 3 5; }
  .zero-tag {
    font: 700 14px var(--sans);
    fill: var(--muted);
    letter-spacing: 0.20em;
    text-transform: uppercase;
  }

  .curve-base {
    fill: none;
    stroke: var(--rule-strong);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .curve-trail {
    fill: none;
    /* Magenta → purple → mint gradient defined in <defs>. */
    stroke: url(#curveGrad);
    stroke-width: 2.6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .station { transition: opacity 0.4s ease; }
  .station .st-connector {
    stroke: var(--ink-soft);
    stroke-width: 1;
    stroke-dasharray: 2 3;
    stroke-opacity: 0.45;
    fill: none;
    transition: stroke 0.4s ease, stroke-width 0.3s ease, stroke-opacity 0.4s ease;
  }
  .station.lit.pain .st-connector,
  .station.lit.reward .st-connector { stroke-opacity: 1; }
  .station .st-marker {
    fill: var(--bg);
    stroke: var(--rule-strong);
    stroke-width: 1.3;
    transition: fill 0.4s ease, stroke 0.4s ease, r 0.3s ease;
  }
  /* Station label "halos" stroke the bg color so the curve visibly passes
     behind each label — matches styledtypedoperator's chart-text trick. */
  .station .st-label-text {
    font: 600 17px var(--sans);
    fill: var(--ink-soft);
    letter-spacing: 0;
    paint-order: stroke fill;
    stroke: var(--bg);
    stroke-width: 5px;
    stroke-linejoin: round;
    transition: fill 0.4s ease;
  }
  .station .st-label-num {
    font: 700 14px var(--mono);
    fill: var(--muted);
    letter-spacing: 0.04em;
    paint-order: stroke fill;
    stroke: var(--bg);
    stroke-width: 4px;
    stroke-linejoin: round;
    transition: fill 0.4s ease;
  }

  /* Bottom callout sits below the curve, not behind it — no halo needed.
     Drop the dark stroke so the italic line reads cleanly. */
  #bottomCallout .st-label-text,
  #bottomCallout .st-label-num {
    stroke: none;
  }
  /* Keep the bottom callout text white at all times — the default featured.lit
     rule below would otherwise flip it to magenta when the curve sweeps past,
     and we want this label to read calmly like every other station label.
     The ID selector beats the .station.featured.lit specificity automatically. */
  #bottomCallout .st-label-text { fill: var(--ink); }

  .station.lit.pain .st-connector { stroke: var(--accent); stroke-width: 1; }
  .station.lit.pain .st-marker     { fill: var(--accent); stroke: var(--accent-deep); }
  .station.lit.pain .st-label-num  { fill: var(--accent); }
  .station.lit.pain .st-label-text { fill: var(--ink); font-weight: 700; }

  .station.lit.reward .st-connector { stroke: var(--reward); stroke-width: 1; }
  .station.lit.reward .st-marker     { fill: var(--reward); stroke: var(--reward-deep); }
  .station.lit.reward .st-label-num  { fill: var(--reward); }
  .station.lit.reward .st-label-text { fill: var(--ink); font-weight: 700; }

  .station.featured .st-marker { stroke-width: 1.6; }
  .station.featured .st-label-text {
    font-style: italic;
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 700;
  }
  .station.featured.lit .st-label-text { fill: var(--accent); }
  .station.featured .pulse-ring {
    fill: none;
    stroke: var(--accent);
    stroke-width: 1.4;
    transform-origin: center;
    transform-box: fill-box;
    animation: pulseRing 2.2s ease-out infinite;
  }
  .station.featured.passed .pulse-ring { animation: none; opacity: 0; }
  @keyframes pulseRing {
    0%   { r: 6;  opacity: 0.0; }
    25%  { opacity: 0.6; }
    100% { r: 22; opacity: 0; }
  }

  /* Hide the ambient reward halo entirely — would be a glow card on bg. */
  .reward-glow { opacity: 0; }

  .curve-trail, .traveler { transition: opacity 0.55s ease-out; }
  .curve-trail.looping-out, .traveler.looping-out { opacity: 0; }

  .traveler { pointer-events: none; }
  .traveler-halo {
    fill: var(--accent);
    opacity: 0.18;
  }
  .traveler-disc {
    fill: var(--ink);
    stroke: var(--bg);
    stroke-width: 2;
  }
  .traveler-tail {
    fill: var(--accent);
    opacity: 0.45;
  }

  /* ---------- Status strip — vertical block in the sidebar ---------- */
  .status-strip {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    padding: 0;
    background: transparent;
    border: 0;
    flex-shrink: 0;
  }
  .status-strip .status-eyebrow {
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    color: var(--muted);
    font-weight: 700;
  }
  .status-strip .status-zone {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 700;
    line-height: 1.08;
    color: var(--ink);
    transition: color 0.35s ease;
    /* Wrap on spaces only — never split a word in half. With the size
       trimmed to 36px, even the longest zone label ("Climbing Toward
       Zero") fits in the 300px sidebar across two lines. */
    overflow-wrap: normal;
    word-break: keep-all;
    hyphens: none;
    max-width: 100%;
  }
  /* Zone label stays pure white regardless of phase — color-shifting between
     magenta and mint felt loud. The detail line + meter still telegraph
     pain/reward without yelling it from the headline. */
  .status-strip .status-zone.pain,
  .status-strip .status-zone.reward { color: var(--ink); }
  .status-strip .status-divider { display: none; }
  .status-strip .status-detail {
    font-family: var(--serif);
    font-style: italic;
    font-size: 23px;
    color: var(--ink-soft);
    line-height: 1.35;
    min-width: 0;
  }
  .status-strip .status-meter {
    position: relative;
    width: 100%;
    height: 4px;
    background: var(--rule);
    flex-shrink: 0;
    overflow: hidden;
    margin-top: 4px;
  }
  .status-strip .status-meter .fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--ink);
    transition: width 0.15s linear, background 0.3s ease;
    width: 0%;
  }
  .status-strip .status-meter.pain .fill { background: var(--accent); }
  .status-strip .status-meter.reward .fill { background: var(--reward); }

  /* ---------- Controls — vertical stack in the sidebar ---------- */
  .controls {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    align-items: stretch;
    padding: 0;
    background: transparent;
    border: 0;
    flex-shrink: 0;
  }
  .control { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .control-label {
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    font-size: 16px;
    font-weight: 700;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    white-space: nowrap;
  }
  .control-value {
    font-family: var(--serif);
    font-size: 27px;
    color: var(--ink);
    font-weight: 700;
    letter-spacing: 0;
    text-transform: none;
    white-space: nowrap;
  }
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%;
    height: 3px;
    background: var(--rule-strong);
    outline: none;
    margin: 6px 0 2px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--ink);
    cursor: pointer;
    border: 0;
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--ink);
    cursor: pointer;
    border: 0;
  }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  button {
    font-family: var(--sans);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 15px;
    font-weight: 700;
    padding: 11px 22px;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--bg);
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
  }
  button.secondary {
    background: transparent;
    color: var(--ink);
  }
  button:hover { opacity: 0.82; }

  /* ---------- Stage tracker pills — flat on bg ---------- */
  .stage-tracker {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 0;
    background: transparent;
    border: 0;
    flex-shrink: 0;
  }
  .stage-pill {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 8px 16px;
    border: 1px solid var(--rule-strong);
    background: transparent;
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 600;
    color: var(--muted);
    transition: background 0.2s, color 0.2s, border-color 0.2s, opacity 0.2s;
    opacity: 0.55;
  }
  .stage-pill .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--rule-strong);
    transition: background 0.2s;
  }
  .stage-pill.active {
    color: var(--ink);
    border-color: var(--ink);
    opacity: 1;
  }
  .stage-pill.active .dot { background: var(--ink); }
  .stage-pill.pain.active {
    color: var(--accent);
    border-color: var(--accent);
  }
  .stage-pill.pain.active .dot { background: var(--accent); }
  .stage-pill.featured.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent-deep);
  }
  .stage-pill.featured.active .dot { background: #fff; }
  .stage-pill.reward.active {
    color: var(--reward);
    border-color: var(--reward);
  }
  .stage-pill.reward.active .dot { background: var(--reward); }
</style>
</head>
<body>
<div class="stage">
  <div class="canvas" id="deck">
    <div class="container">

      <div class="chart-area">
        <svg id="dipSvg" viewBox="0 0 1210 760" preserveAspectRatio="xMidYMin meet" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="painWashGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stop-color="rgba(236,72,153,0.04)"/>
              <stop offset="100%" stop-color="rgba(236,72,153,0.13)"/>
            </linearGradient>
            <linearGradient id="rewardWashGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stop-color="rgba(45,226,160,0.14)"/>
              <stop offset="100%" stop-color="rgba(45,226,160,0.04)"/>
            </linearGradient>
            <radialGradient id="travelerHaloGrad" cx="0.5" cy="0.5" r="0.5">
              <stop offset="0%"   stop-color="rgba(236,72,153,0.40)"/>
              <stop offset="100%" stop-color="rgba(236,72,153,0)"/>
            </radialGradient>

            <linearGradient id="curveGrad" x1="110" y1="0" x2="1170" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#EC4899"/>
              <stop offset="50%"  stop-color="#A855F7"/>
              <stop offset="100%" stop-color="#2DE2A0"/>
            </linearGradient>

            <marker id="axisArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
              <path d="M0,0 L10,5 L0,10 z" fill="#FFFFFF" />
            </marker>
          </defs>

          <rect class="pain-wash" x="100" y="240" width="1080" height="420" fill="url(#painWashGrad)"/>
          <rect class="reward-wash" x="100" y="60" width="1080" height="180" fill="url(#rewardWashGrad)"/>
          <ellipse class="reward-glow" id="rewardGlow" cx="1020" cy="160" rx="360" ry="170" fill="none"/>

          <!-- (Removed: the in-plot phase title card. The status strip below
               the chart carries that narration; the floating card was a
               redundant on-canvas duplicate.) -->

          <line class="axis-line" x1="100" y1="40"  x2="100" y2="660" marker-start="url(#axisArrow)"/>
          <text class="axis-label" x="58" y="80"  text-anchor="middle" transform="rotate(-90 58 80)">REWARD →</text>
          <text class="axis-label" x="58" y="600" text-anchor="middle" transform="rotate(-90 58 600)">← PAIN</text>

          <line class="grid-line" x1="100" y1="240" x2="1180" y2="240"/>
          <line class="zero-line" x1="100" y1="240" x2="1180" y2="240"/>
          <text class="zero-tag" x="92" y="245" text-anchor="end">0 · NEUTRAL</text>

          <line class="axis-line" x1="100" y1="665" x2="1200" y2="665" marker-end="url(#axisArrow)"/>
          <text class="axis-label" x="640" y="710" text-anchor="middle">GOVERNANCE BUILD-OUT</text>

          <g id="phaseTicks"></g>

          <path id="curveBase"  class="curve-base"  d=""/>
          <path id="curveTrail" class="curve-trail" d=""/>

          <g id="stations"></g>
          <g id="bottomCallout"></g>

          <g class="traveler" id="traveler" transform="translate(110,240)">
            <circle class="traveler-halo" id="travHalo" r="22" fill="url(#travelerHaloGrad)"/>
            <circle class="traveler-tail" cx="0" cy="0" r="8.5"/>
            <circle class="traveler-disc" r="5.5"/>
          </g>
        </svg>
      </div>

      <div class="sidebar">
        <div class="status-strip" id="statusStrip">
          <span class="status-eyebrow">Current state</span>
          <span class="status-zone" id="statusZone">Neutral</span>
          <span class="status-detail" id="statusDetail">Before MRM. Velocity steady, exposure unmanaged.</span>
          <div class="status-meter" id="statusMeter"><div class="fill" id="statusMeterFill"></div></div>
        </div>

        <div class="controls">
          <div class="control">
            <div class="control-label"><span>Playback</span></div>
            <div class="btn-row">
              <button id="playBtn">Pause</button>
              <button id="resetBtn" class="secondary">Reset</button>
            </div>
          </div>
          <div class="control">
            <div class="control-label"><span>Speed</span><span class="control-value" id="speedVal">0.5×</span></div>
            <input type="range" id="speed" min="0" max="3" step="1" value="1" />
          </div>
        </div>

        <div class="stage-tracker" id="tracker"></div>
      </div>

    </div>
  </div>
</div>

<script>
// ---------- Scale the 1740×780 deck to fit the viewport ----------
(function () {
  const deck = document.getElementById("deck");
  function resize() {
    const W = 1740, H = 920;
    const s = Math.min(window.innerWidth / W, window.innerHeight / H);
    deck.style.transform = `scale(${s})`;
  }
  window.addEventListener("resize", resize);
  resize();
})();

(function () {
  "use strict";

  const WAYPOINTS = [
    { x:  110, y: 240 },
    { x:  175, y: 244 },
    { x:  250, y: 268 },
    { x:  330, y: 320 },
    { x:  410, y: 395 },
    { x:  485, y: 485 },
    { x:  555, y: 565 },
    { x:  605, y: 605 },
    { x:  640, y: 615 },
    { x:  690, y: 600 },
    { x:  755, y: 540 },
    { x:  825, y: 440 },
    { x:  890, y: 330 },
    { x:  945, y: 240 },
    { x: 1000, y: 175 },
    { x: 1060, y: 130 },
    { x: 1115, y: 100 },
    { x: 1170, y:  85 },
  ];

  function smoothPath(pts, tension) {
    if (pts.length < 2) return "";
    const t = tension == null ? 0.5 : tension;
    let d = `M ${pts[0].x.toFixed(2)} ${pts[0].y.toFixed(2)}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[i - 1] || pts[i];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[i + 2] || p2;
      const c1x = p1.x + ((p2.x - p0.x) / 6) * (t * 2);
      const c1y = p1.y + ((p2.y - p0.y) / 6) * (t * 2);
      const c2x = p2.x - ((p3.x - p1.x) / 6) * (t * 2);
      const c2y = p2.y - ((p3.y - p1.y) / 6) * (t * 2);
      d += ` C ${c1x.toFixed(2)} ${c1y.toFixed(2)}, ${c2x.toFixed(2)} ${c2y.toFixed(2)}, ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
    }
    return d;
  }

  const pathD = smoothPath(WAYPOINTS, 0.55);
  const curveBase = document.getElementById("curveBase");
  const curveTrail = document.getElementById("curveTrail");
  curveBase.setAttribute("d", pathD);
  curveTrail.setAttribute("d", pathD);

  const totalLen = curveBase.getTotalLength();
  curveTrail.setAttribute("stroke-dasharray", `0 ${totalLen}`);

  const STATIONS = [
    { id: "s1", num: "01", t: 0.080, lx: 250, ly: 200, anchor: "start",
      noEyebrow: true,
      label: "Standing up the MRM org & AI committees", reward: false },
    { id: "s2", num: "02", t: 0.180, lx: 350, ly: 270, anchor: "start",
      noEyebrow: true,
      label: "Independent validation & testing",        reward: false },
    { id: "s3", num: "03", t: 0.275, lx: 460, ly: 320, anchor: "start",
      noEyebrow: true,
      label: "Quarterly revalidation cycles",          reward: false },
    { id: "s4", num: "04", t: 0.370, lx: 530, ly: 455, anchor: "start",
      noEyebrow: true,
      label: ["Audit, security,", "version-control mandates"],   reward: false },

    { id: "s5", num: "05", t: 0.555, perpSide: "above", perpDist: 70,
      anchor: "middle", noEyebrow: true,
      label: ["Reusable control", "patterns"],          reward: false },
    { id: "s6", num: "06", t: 0.625, perpSide: "above", perpDist: 100,
      anchor: "middle", noEyebrow: true,
      label: ["Self-service", "governed environments"], reward: false },
    { id: "s7", num: "07", t: 0.690, perpSide: "above", perpDist: 75,
      anchor: "middle", noEyebrow: true,
      label: ["Lineage by default,", "not by chore"],   reward: false },
    { id: "s8", num: "08", t: 0.760, perpSide: "above", perpDist: 70,
      anchor: "middle", noEyebrow: true,
      label: ["Easier sharing ·", "faster onboarding"], reward: false },

    { id: "s9",  num: "09", t: 0.815, perpSide: "above", perpDist: 70,
      anchor: "middle", noEyebrow: true,
      label: "Audit-ready by default",                   reward: true },
    { id: "s10", num: "10", t: 0.860, perpSide: "above", perpDist: 90,
      anchor: "middle", noEyebrow: true,
      label: "MRM becomes a source of value",            reward: true },
    { id: "s11", num: "11", t: 0.925, lx: 1080, ly: 200,
      anchor: "middle", noEyebrow: true,
      label: ["Models ship faster", "then without MRM"],  reward: true },
    { id: "s12", num: "12", t: 0.988, lx: 1175, ly: 145,
      anchor: "end",    noEyebrow: true,
      label: ["Compounding", "velocity"],                reward: true },
  ];

  const BOTTOM_CALLOUT = {
    t: 0.463,
    lx: 640, ly: 653,
    label: "The check-the-box trap",
    sub: "Most governance programs stall here.",
  };

  function pointAtT(t) {
    return curveBase.getPointAtLength(Math.max(0, Math.min(1, t)) * totalLen);
  }

  function tangentAtT(t) {
    const eps = 0.0008;
    const a = pointAtT(Math.max(0, t - eps));
    const b = pointAtT(Math.min(1, t + eps));
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    const m = Math.hypot(dx, dy) || 1;
    return { x: dx / m, y: dy / m };
  }

  function perpAtT(t, side) {
    const tan = tangentAtT(t);
    const cw = { x:  tan.y, y: -tan.x };
    const ccw = { x: -tan.y, y:  tan.x };
    if (side === "above") return cw.y < ccw.y ? cw : ccw;
    return cw.y > ccw.y ? cw : ccw;
  }

  function labelAnchorAtT(t, side, dist) {
    const p = pointAtT(t);
    const n = perpAtT(t, side);
    return { px: p.x, py: p.y, lx: p.x + n.x * dist, ly: p.y + n.y * dist };
  }

  const stationsRoot = document.getElementById("stations");
  const SVG_NS = "http://www.w3.org/2000/svg";

  STATIONS.forEach((st) => {
    const curvePt = pointAtT(st.t);
    let a;
    if (st.lx != null && st.ly != null) {
      a = { px: curvePt.x, py: curvePt.y, lx: st.lx, ly: st.ly };
    } else if (st.perpSide) {
      a = labelAnchorAtT(st.t, st.perpSide, st.perpDist || 60);
    } else {
      a = labelAnchorAtT(st.t, st.side || "above", st.labelDist || 60);
    }

    const g = document.createElementNS(SVG_NS, "g");
    g.setAttribute("class", "station " + (st.reward ? "reward" : "pain") + (st.featured ? " featured" : ""));
    g.setAttribute("data-id", st.id);
    g.setAttribute("data-t", String(st.t));

    const conn = document.createElementNS(SVG_NS, "line");
    conn.setAttribute("class", "st-connector");
    conn.setAttribute("x1", a.px.toFixed(2));
    conn.setAttribute("y1", a.py.toFixed(2));
    conn.setAttribute("x2", a.lx.toFixed(2));
    conn.setAttribute("y2", a.ly.toFixed(2));
    g.appendChild(conn);

    const marker = document.createElementNS(SVG_NS, "circle");
    marker.setAttribute("class", "st-marker");
    marker.setAttribute("cx", a.px.toFixed(2));
    marker.setAttribute("cy", a.py.toFixed(2));
    marker.setAttribute("r", "4.5");
    g.appendChild(marker);

    const labelG = document.createElementNS(SVG_NS, "g");

    if (!st.noEyebrow) {
      const num = document.createElementNS(SVG_NS, "text");
      num.setAttribute("class", "st-label-num");
      num.setAttribute("x", a.lx.toFixed(2));
      num.setAttribute("y", (a.ly - 14).toFixed(2));
      num.setAttribute("text-anchor", st.anchor);
      num.textContent = "STATION " + st.num;
      labelG.appendChild(num);
    }

    const lines = Array.isArray(st.label) ? st.label : [st.label];
    lines.forEach((line, i) => {
      const txt = document.createElementNS(SVG_NS, "text");
      txt.setAttribute("class", "st-label-text");
      txt.setAttribute("x", a.lx.toFixed(2));
      txt.setAttribute("y", (a.ly + i * 16).toFixed(2));
      txt.setAttribute("text-anchor", st.anchor);
      txt.textContent = line;
      labelG.appendChild(txt);
    });

    g.appendChild(labelG);
    stationsRoot.appendChild(g);
  });

  const bottomCalloutRoot = document.getElementById("bottomCallout");
  (function buildBottomCallout() {
    const curvePt = pointAtT(BOTTOM_CALLOUT.t);
    const a = { px: curvePt.x, py: curvePt.y, lx: BOTTOM_CALLOUT.lx, ly: BOTTOM_CALLOUT.ly };

    const g = document.createElementNS(SVG_NS, "g");
    g.setAttribute("class", "station featured pain");
    g.setAttribute("data-id", "bottom");
    g.setAttribute("data-t", String(BOTTOM_CALLOUT.t));

    const pulse = document.createElementNS(SVG_NS, "circle");
    pulse.setAttribute("class", "pulse-ring");
    pulse.setAttribute("cx", a.px.toFixed(2));
    pulse.setAttribute("cy", a.py.toFixed(2));
    pulse.setAttribute("r", "8");
    g.appendChild(pulse);

    const conn = document.createElementNS(SVG_NS, "line");
    conn.setAttribute("class", "st-connector");
    conn.setAttribute("x1", a.px.toFixed(2));
    conn.setAttribute("y1", a.py.toFixed(2));
    conn.setAttribute("x2", a.lx.toFixed(2));
    conn.setAttribute("y2", (a.ly - 14).toFixed(2));
    g.appendChild(conn);

    const marker = document.createElementNS(SVG_NS, "circle");
    marker.setAttribute("class", "st-marker");
    marker.setAttribute("cx", a.px.toFixed(2));
    marker.setAttribute("cy", a.py.toFixed(2));
    marker.setAttribute("r", "5.5");
    g.appendChild(marker);

    const labelG = document.createElementNS(SVG_NS, "g");

    // "BOTTOM OF THE DIP" eyebrow removed — the italic line + marker carry
    // the moment without a redundant caps label above.

    const title = document.createElementNS(SVG_NS, "text");
    title.setAttribute("class", "st-label-text");
    title.setAttribute("x", a.lx.toFixed(2));
    title.setAttribute("y", a.ly.toFixed(2));
    title.setAttribute("text-anchor", "middle");
    title.textContent = BOTTOM_CALLOUT.label + " — " + BOTTOM_CALLOUT.sub;
    labelG.appendChild(title);

    g.appendChild(labelG);
    bottomCalloutRoot.appendChild(g);
  })();

  const PHASES = [
    { t: 0.000, label: "Before",      align: "start"  },
    { t: 0.220, label: "Building",    align: "middle" },
    { t: 0.463, label: "The Trap",    align: "middle" },
    { t: 0.680, label: "Compounding", align: "middle" },
    { t: 0.985, label: "Reward",      align: "end"    },
  ];
  const phaseRoot = document.getElementById("phaseTicks");
  PHASES.forEach((ph) => {
    const p = pointAtT(ph.t);
    const tk = document.createElementNS(SVG_NS, "line");
    tk.setAttribute("class", "grid-line");
    tk.setAttribute("x1", p.x);
    tk.setAttribute("x2", p.x);
    tk.setAttribute("y1", 665);
    tk.setAttribute("y2", 673);
    phaseRoot.appendChild(tk);

    const lbl = document.createElementNS(SVG_NS, "text");
    lbl.setAttribute("class", "grid-tick");
    lbl.setAttribute("x", p.x);
    lbl.setAttribute("y", 668);
    lbl.setAttribute("text-anchor", ph.align);
    lbl.style.dominantBaseline = "hanging";
    lbl.style.fontSize = "15px";
    lbl.style.letterSpacing = "0.16em";
    lbl.textContent = ph.label.toUpperCase();
    phaseRoot.appendChild(lbl);
  });

  // ---------- Status overlay ----------
  const statusZoneEl   = document.getElementById("statusZone");
  const statusDetailEl = document.getElementById("statusDetail");
  const statusMeter    = document.getElementById("statusMeter");
  const statusFill     = document.getElementById("statusMeterFill");

  function narrate(progress, py) {
    const ZERO_Y = 240;
    const PAIN_FLOOR = 615;
    const REWARD_TOP = 85;
    let intensity, zoneClass, zoneLabel, detail;

    if (py >= ZERO_Y) intensity = (py - ZERO_Y) / (PAIN_FLOOR - ZERO_Y);
    else              intensity = (ZERO_Y - py) / (ZERO_Y - REWARD_TOP);
    intensity = Math.max(0, Math.min(1, intensity));

    if (progress < 0.05) {
      zoneClass = ""; zoneLabel = "Neutral";
      detail = "Before MRM. Velocity steady, exposure unmanaged.";
    } else if (progress < 0.16) {
      zoneClass = "pain"; zoneLabel = "Building the Org";
      detail = "Committees, charters, validators. None of this ships a model yet.";
    } else if (progress < 0.30) {
      zoneClass = "pain"; zoneLabel = "Adding Controls";
      detail = "Independent validation, separation of duties — every workflow gets a handoff.";
    } else if (progress < 0.42) {
      zoneClass = "pain"; zoneLabel = "Process Overhead";
      detail = "Documentation, sign-offs, audit gates. Real work, all of it scaffolding.";
    } else if (progress < 0.52) {
      zoneClass = "pain"; zoneLabel = "The Check-the-Box Trap";
      detail = "All controls in place. Pain real, value not landed yet. Most programs stop here.";
    } else if (progress < 0.68) {
      zoneClass = "pain"; zoneLabel = "Compounding Begins";
      detail = "Controls become primitives. Patterns become buttons. The same work, with leverage.";
    } else if (progress < 0.808) {
      zoneClass = "pain"; zoneLabel = "Climbing Toward Zero";
      detail = "Self-service governed environments mean ship-day is closer than start-day.";
    } else if (progress < 0.95) {
      zoneClass = "reward"; zoneLabel = "Above Water";
      detail = "Past neutral. Trust, lineage, auditability are now defaults, not chores.";
    } else {
      zoneClass = "reward"; zoneLabel = "Excellent";
      detail = "Velocity higher than before MRM. Compliance amortised across the platform.";
    }
    return { intensity, zoneClass, zoneLabel, detail };
  }

  function updateStatus(progress, py) {
    const n = narrate(progress, py);
    statusZoneEl.textContent = n.zoneLabel;
    statusZoneEl.className = "status-zone " + (n.zoneClass || "");
    statusDetailEl.textContent = n.detail;
    statusMeter.className = "status-meter " + (n.zoneClass || "");
    statusFill.style.width = (n.intensity * 100).toFixed(1) + "%";
  }

  // ---------- Stage tracker pills ----------
  const STAGES = [
    { name: "Before MRM",       kind: "neutral", t: 0.00 },
    { name: "Building",         kind: "pain",    t: 0.05 },
    { name: "Adding Controls",  kind: "pain",    t: 0.16 },
    { name: "Process Overhead", kind: "pain",    t: 0.30 },
    { name: "The Trap",         kind: "featured",t: 0.42 },
    { name: "Compounding",      kind: "pain",    t: 0.52 },
    { name: "Climbing",         kind: "pain",    t: 0.68 },
    { name: "Above Water",      kind: "reward",  t: 0.808 },
    { name: "Excellent",        kind: "reward",  t: 0.95 },
  ];
  const tracker = document.getElementById("tracker");
  STAGES.forEach((s, i) => {
    const pill = document.createElement("span");
    pill.className = "stage-pill " + (s.kind === "featured" ? "featured" : s.kind);
    pill.dataset.idx = i;
    pill.dataset.t = String(s.t);
    pill.innerHTML = `<span class="dot"></span><span>${s.name}</span>`;
    pill.style.cursor = "pointer";
    pill.title = "Jump to: " + s.name;
    pill.addEventListener("click", () => {
      setProgress(Math.min(0.999, parseFloat(pill.dataset.t) + 0.005));
      state.playing = false;
      playBtn.textContent = "Play";
    });
    tracker.appendChild(pill);
  });
  function updateTracker(progress) {
    [...tracker.children].forEach((el) => {
      const t = parseFloat(el.dataset.t);
      el.classList.toggle("active", progress >= t);
    });
  }

  // ---------- Animation state ----------
  const state = { progress: 0, playing: true, speed: 0.5, baseDuration: 28 };

  const traveler = document.getElementById("traveler");
  const travHalo = document.getElementById("travHalo");

  function setProgress(p) {
    state.progress = Math.max(0, Math.min(1, p));
    const len = state.progress * totalLen;

    const pt = curveBase.getPointAtLength(len);
    traveler.setAttribute("transform", `translate(${pt.x.toFixed(2)} ${pt.y.toFixed(2)})`);

    curveTrail.setAttribute("stroke-dasharray", `${len.toFixed(2)} ${(totalLen - len + 1).toFixed(2)}`);

    const LOOKAHEAD = 0.005;
    [...stationsRoot.children, ...bottomCalloutRoot.children].forEach((g) => {
      const t = parseFloat(g.dataset.t);
      const passed = state.progress + LOOKAHEAD >= t;
      g.classList.toggle("lit", passed);
      if (passed && g.classList.contains("featured")) g.classList.add("passed");
      else if (!passed && g.classList.contains("featured")) g.classList.remove("passed");
    });

    const py = pt.y;
    const ZERO_Y = 240, FLOOR = 615, TOP = 85;
    let depthAbs;
    if (py >= ZERO_Y) depthAbs = (py - ZERO_Y) / (FLOOR - ZERO_Y);
    else              depthAbs = (ZERO_Y - py) / (ZERO_Y - TOP);
    travHalo.setAttribute("r", String(18 + depthAbs * 14));
    travHalo.style.opacity = String(0.18 + depthAbs * 0.40);

    updateStatus(state.progress, py);
    updateTracker(state.progress);
  }

  // ---------- Animation loop (forward → endHold → fadeOut → fadeIn → forward) ----------
  let last = performance.now();
  let phase = "forward";
  let phaseTime = 0;
  const HOLD_SECONDS    = 0.45;
  const FADE_OUT_SECS   = 0.55;
  const FADE_IN_SECS    = 0.55;

  function startFadeOut() {
    curveTrail.classList.add("looping-out");
    traveler.classList.add("looping-out");
  }
  function endFadeOut() {
    setProgress(0);
    curveTrail.classList.remove("looping-out");
    traveler.classList.remove("looping-out");
  }
  function clearLoopState() {
    phase = "forward";
    phaseTime = 0;
    curveTrail.classList.remove("looping-out");
    traveler.classList.remove("looping-out");
  }

  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    if (state.playing) {
      if (phase === "forward") {
        const inc = (dt * state.speed) / state.baseDuration;
        let p = state.progress + inc;
        if (p >= 1) { p = 1; phase = "endHold"; phaseTime = 0; }
        setProgress(p);
      } else if (phase === "endHold") {
        phaseTime += dt;
        if (phaseTime >= HOLD_SECONDS) { startFadeOut(); phase = "fadeOut"; phaseTime = 0; }
      } else if (phase === "fadeOut") {
        phaseTime += dt;
        if (phaseTime >= FADE_OUT_SECS) { endFadeOut(); phase = "fadeIn"; phaseTime = 0; }
      } else if (phase === "fadeIn") {
        phaseTime += dt;
        if (phaseTime >= FADE_IN_SECS) { phase = "forward"; }
      }
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---------- Controls wiring ----------
  const playBtn = document.getElementById("playBtn");
  playBtn.addEventListener("click", () => {
    if (state.progress >= 1 && !state.playing) {
      clearLoopState();
      setProgress(0);
      state.playing = true;
      playBtn.textContent = "Pause";
    } else {
      state.playing = !state.playing;
      playBtn.textContent = state.playing ? "Pause" : "Play";
    }
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    clearLoopState();
    setProgress(0);
    state.playing = true;
    playBtn.textContent = "Pause";
    document.getElementById("speed").value = "1";
    document.getElementById("speed").dispatchEvent(new Event("input"));
  });

  // Speed stops cap at 1× — fastest the audience can comfortably read.
  const SPEED_STOPS = [0.25, 0.5, 0.75, 1];
  const speedEl = document.getElementById("speed");
  const speedVal = document.getElementById("speedVal");
  function applySpeed() {
    const v = SPEED_STOPS[parseInt(speedEl.value, 10)];
    state.speed = v;
    speedVal.textContent = v + "×";
  }
  speedEl.addEventListener("input", applySpeed);
  applySpeed();

  // Click anywhere on the chart to jump to that x-fraction of the path.
  const svg = document.getElementById("dipSvg");
  const chartArea = document.querySelector(".chart-area");
  chartArea.addEventListener("click", (e) => {
    if (e.target.closest("button") || e.target.closest("input")) return;
    const rect = svg.getBoundingClientRect();
    const xVB = ((e.clientX - rect.left) / rect.width) * 1280;
    let bestL = 0, bestDx = Infinity;
    const SAMPLES = 200;
    for (let i = 0; i <= SAMPLES; i++) {
      const l = (i / SAMPLES) * totalLen;
      const p = curveBase.getPointAtLength(l);
      const dx = Math.abs(p.x - xVB);
      if (dx < bestDx) { bestDx = dx; bestL = l; }
    }
    clearLoopState();
    setProgress(bestL / totalLen);
    state.playing = false;
    playBtn.textContent = "Play";
  });

  setProgress(0);

})();
</script>
</body>
</html>
